name: Rust

on:
  push:
    branches: [ "mainline" ]
  pull_request:
    branches: [ "mainline" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install exiftool exiv2 libgexiv2-2
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
